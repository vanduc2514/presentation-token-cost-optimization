<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <rect width="800" height="480" fill="#f8f7ff" rx="16"/>

  <!-- Title -->
  <text x="400" y="52" font-family="system-ui, sans-serif" font-size="22" font-weight="600"
        fill="#4f46e5" text-anchor="middle" letter-spacing="0.5">SAMPLE DIAGRAM</text>
  <line x1="160" y1="66" x2="640" y2="66" stroke="#e4e4e7" stroke-width="1.5"/>

  <!-- Node A -->
  <rect x="60" y="120" width="180" height="80" rx="12" fill="#edeafc" stroke="#c7c3f0" stroke-width="1.5"/>
  <text x="150" y="155" font-family="system-ui, sans-serif" font-size="15" font-weight="600"
        fill="#4f46e5" text-anchor="middle">Node A</text>
  <text x="150" y="178" font-family="system-ui, sans-serif" font-size="12"
        fill="#52525b" text-anchor="middle">Input / Source</text>

  <!-- Node B -->
  <rect x="310" y="120" width="180" height="80" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="400" y="155" font-family="system-ui, sans-serif" font-size="15" font-weight="600"
        fill="#059669" text-anchor="middle">Node B</text>
  <text x="400" y="178" font-family="system-ui, sans-serif" font-size="12"
        fill="#52525b" text-anchor="middle">Transform</text>

  <!-- Node C -->
  <rect x="560" y="120" width="180" height="80" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="650" y="155" font-family="system-ui, sans-serif" font-size="15" font-weight="600"
        fill="#d97706" text-anchor="middle">Node C</text>
  <text x="650" y="178" font-family="system-ui, sans-serif" font-size="12"
        fill="#52525b" text-anchor="middle">Output</text>

  <!-- Arrows A -> B -->
  <line x1="242" y1="160" x2="308" y2="160" stroke="#a1a1aa" stroke-width="2"/>
  <polygon points="308,155 320,160 308,165" fill="#a1a1aa"/>

  <!-- Arrows B -> C -->
  <line x1="492" y1="160" x2="558" y2="160" stroke="#a1a1aa" stroke-width="2"/>
  <polygon points="558,155 570,160 558,165" fill="#a1a1aa"/>

  <!-- Detail row -->
  <rect x="60" y="270" width="680" height="140" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1.5"/>
  <text x="80" y="300" font-family="system-ui, sans-serif" font-size="13" font-weight="600"
        fill="#4f46e5" letter-spacing="0.8">DETAIL</text>

  <rect x="80" y="316" width="190" height="72" rx="8" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1"/>
  <text x="175" y="347" font-family="system-ui, sans-serif" font-size="13"
        fill="#18181b" text-anchor="middle">Step one</text>
  <text x="175" y="368" font-family="system-ui, sans-serif" font-size="11"
        fill="#71717a" text-anchor="middle">Description here</text>

  <rect x="305" y="316" width="190" height="72" rx="8" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1"/>
  <text x="400" y="347" font-family="system-ui, sans-serif" font-size="13"
        fill="#18181b" text-anchor="middle">Step two</text>
  <text x="400" y="368" font-family="system-ui, sans-serif" font-size="11"
        fill="#71717a" text-anchor="middle">Description here</text>

  <rect x="530" y="316" width="190" height="72" rx="8" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1"/>
  <text x="625" y="347" font-family="system-ui, sans-serif" font-size="13"
        fill="#18181b" text-anchor="middle">Step three</text>
  <text x="625" y="368" font-family="system-ui, sans-serif" font-size="11"
        fill="#71717a" text-anchor="middle">Description here</text>

  <!-- Footer -->
  <text x="400" y="456" font-family="system-ui, sans-serif" font-size="11"
        fill="#a1a1aa" text-anchor="middle">Replace this diagram with your own · slides/images/</text>
</svg>
